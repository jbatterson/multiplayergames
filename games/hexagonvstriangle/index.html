<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Hexagon vs Triangle</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;900&display=swap" rel="stylesheet" />
  <style>
    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      margin-bottom: 1.5rem;
    }
    .header-side {
      width: 32px;
      display: flex;
      align-items: center;
    }
    .home-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .home-btn:hover { opacity: 0.5; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: #fff;
      color: #000;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 28px 16px 40px;
    }
    .game-container {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .title {
      font-weight: 900;
      font-size: clamp(1.2rem, 5vw, 1.8rem);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin: 0;
      text-align: center;
    }
    .btn {
      width: 100%;
      padding: 1rem 0;
      border: 2px solid #000;
      background: #fff;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
    }
    .btn:hover:not(:disabled) { background: #000; color: #fff; }
    .btn:disabled { opacity: 0.2; cursor: not-allowed; }
    .btn-primary {
      background: #000; color: #fff;
      font-weight: 900; font-size: 0.8rem; letter-spacing: 0.12em;
    }
    .btn-primary:hover:not(:disabled) { background: #333; }
    #screen-lobby {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }
    .lobby-divider {
      font-size: 0.65rem; font-weight: 600;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: #999; margin: 0.25rem 0;
    }
    #link-panel {
      width: 100%; border: 2px solid #000;
      padding: 1rem; display: none;
      flex-direction: column; gap: 0.75rem;
    }
    #link-panel.visible { display: flex; }
    .link-box { display: flex; gap: 0.5rem; align-items: stretch; }
    #share-url {
      flex: 1; border: 2px solid #000;
      padding: 0.5rem 0.75rem;
      font-family: 'Outfit', sans-serif;
      font-size: 0.7rem; color: #000; background: #f9f9f9;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    #copy-btn { width: auto; padding: 0 1rem; flex-shrink: 0; font-size: 0.65rem; }
    .link-instructions { font-size: 0.7rem; font-weight: 600; text-align: center; color: #444; }
    .status-line {
      font-size: 0.65rem; font-weight: 900;
      letter-spacing: 0.2em; text-transform: uppercase;
      text-align: center; min-height: 1em;
    }
    #screen-game {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .turn-indicator {
      margin-bottom: 0.75rem;
      font-size: 0.7rem; font-weight: 900;
      letter-spacing: 0.15em; text-transform: uppercase;
      text-align: center; min-height: 1.4em;
    }
    .turn-indicator .color-blue { color: #1a3adb; }
    .turn-indicator .color-red  { color: #cc1111; }
    #board-svg {
      width: 100%; max-width: 400px;
      display: block; margin-bottom: 1.25rem;
    }
    .game-controls {
      width: 100%; max-width: 400px;
      display: flex; flex-direction: column; gap: 0.75rem;
    }
    .instructions {
      font-size: 0.8rem;
      line-height: 1.6;
      text-align: center;
      max-width: 300px;
      margin-bottom: 1.5rem;
      color: #222;
    }
    .c-blue { color: #1a3adb; font-weight: 700; }
    .c-red  { color: #cc1111; font-weight: 700; }
    .circle-fade { opacity: 0.35; transition: opacity 0.35s; }
    .hidden { display: none !important; }
  </style>
</head>

<script>
"use strict";

// ============================================================
// SECTION 1 — CONFIG / CONSTANTS
// ============================================================
const CONFIG = {
  gameIdLength: 4,
  gameIdChars: 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789',
};

// ============================================================
// SECTION 2 — FIREBASE CONFIG
// ============================================================
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyDrnan5rxxGwcCpS3tnB68OSTG6toQOL6A",
  authDomain:        "multiplayer-tic-tac-toe-1611a.firebaseapp.com",
  databaseURL:       "https://multiplayer-tic-tac-toe-1611a-default-rtdb.firebaseio.com",
  projectId:         "multiplayer-tic-tac-toe-1611a",
  storageBucket:     "multiplayer-tic-tac-toe-1611a.firebasestorage.app",
  messagingSenderId: "896542207536",
  appId:             "1:896542207536:web:6dd25e3b8950dc65ec47f5",
};

// ============================================================
// SECTION 3 — SYNC ADAPTER
// ============================================================
const syncAdapter = (() => {
  let db = null, activeRef = null, activeHandler = null;
  function init() {
    if (FIREBASE_CONFIG.apiKey === "YOUR_API_KEY") return false;
    try { firebase.initializeApp(FIREBASE_CONFIG); db = firebase.database(); return true; }
    catch(e) { console.error("Firebase init failed:", e); return false; }
  }
  function push(gameId, state) { if (db) db.ref('trollhole/' + gameId).set(state); }
  function onStateChange(gameId, cb) {
    unsubscribe();
    if (!db) return;
    activeRef = db.ref('trollhole/' + gameId);
    activeHandler = activeRef.on('value', snap => { if (snap.exists()) cb(snap.val()); });
  }
  function unsubscribe() {
    if (activeRef && activeHandler) activeRef.off('value', activeHandler);
    activeRef = null; activeHandler = null;
  }
  const ready = init();
  return { push, onStateChange, unsubscribe, ready };
})();

// ============================================================
// SECTION 4 — PLAYER IDENTITY
// ============================================================
const identity = (() => {
  const KEY = 'cb_player_id';
  let id = localStorage.getItem(KEY);
  if (!id) { id = Math.random().toString(36).slice(2, 10); localStorage.setItem(KEY, id); }
  function getRole(state) {
    if (state.playerBlue === id) return 'blue';
    if (state.playerRed  === id) return 'red';
    return 'spectator';
  }
  return { id, getRole };
})();

// ============================================================
// SECTION 5 — LOBBY / URL LOGIC
// ============================================================
const lobby = (() => {
  function generateId() {
    let id = '';
    for (let i = 0; i < CONFIG.gameIdLength; i++)
      id += CONFIG.gameIdChars[Math.floor(Math.random() * CONFIG.gameIdChars.length)];
    return id;
  }
  function getGameIdFromUrl() { return new URLSearchParams(window.location.search).get('game'); }
  function buildShareUrl(gameId) {
    const u = new URL(window.location.href); u.search = ''; u.searchParams.set('game', gameId); return u.toString();
  }
  function pushUrlState(gameId) { window.history.replaceState({}, '', buildShareUrl(gameId)); }
  return { generateId, getGameIdFromUrl, buildShareUrl, pushUrlState };
})();

// ============================================================
// SECTION 6 — GAME ENGINE  ← cartridge
// ============================================================
const engine = (() => {

  // starting tokens requested
  const START_TOKENS = [0,1,3,5,8,9,11];

  // adjacency graph for the 2-3-4-3 board
  const ADJ = {
    0:[1,2,3],
    1:[0,3,4],
    2:[0,3,5,6],
    3:[0,1,2,4,6,7],
    4:[1,3,7,8],
    5:[2,6,9],
    6:[2,3,5,7,9,10],
    7:[3,4,6,8,10,11],
    8:[4,7,11],
    9:[5,6,10],
    10:[6,7,9,11],
    11:[7,8,10]
  };

  // jump map: A -> [{over:B, land:C}]
  const JUMPS = {
    0:[{over:2,land:5},{over:3,land:7}],
    1:[{over:3,land:6},{over:4,land:8}],
    2:[{over:3,land:4},{over:6,land:10}],
    3:[{over:6,land:9},{over:7,land:11}],
    4:[{over:3,land:2},{over:7,land:10}],
    5:[{over:6,land:7},{over:2,land:0}],
    6:[{over:3,land:1},{over:7,land:8}],
    7:[{over:6,land:5},{over:3,land:0}],
    8:[{over:7,land:6},{over:4,land:1}],
    9:[{over:6,land:3},{over:10,land:11}],
    10:[{over:11,land:11},{over:7,land:4},{over:6,land:2}],
    11:[{over:10,land:9},{over:7,land:3}]
  };

  function initState(gameIndex){
    const board = Array(12).fill('_');
    START_TOKENS.forEach(i=>board[i]='token');

    return {
      board,
      turn: gameIndex % 2 === 0 ? 'blue' : 'red',
      result:'playing',
      winner:null,
      playerBlue:null,
      playerRed:null,
      selected:null,
      moves:[],
      gameIndex
    };
  }

  function legalMoves(board, from){
    const out=[];

    // slides
    ADJ[from].forEach(n=>{
      if(board[n]==='_') out.push(n);
    });

    // jumps
    (JUMPS[from]||[]).forEach(j=>{
      if(board[j.over]==='token' && board[j.land]==='_') out.push(j.land);
    });

    return out;
  }

  function applyMove(state, cell, player){

    // freeze after win
    if(state.result==='win') return state;
    const board = state.board.slice();

    // tap away from any cell
    if(cell === null || cell === undefined){
      return {...state, selected:null, moves:[]};
    }

    // selecting token
    if(board[cell]==='token'){
      // tapping the same token again deselects
      if(state.selected===cell){
        return {...state, selected:null, moves:[]};
      }
      const moves = legalMoves(board,cell);
      return {...state, selected:cell, moves};
    }

    // moving token
    if(state.selected!==null && state.moves.includes(cell)){
      board[state.selected]='_';
      board[cell]='token';

      let result='playing';
      let winner=null;
      let winningSet=null;

      // blue = hexagon, red = triangle
      const hex = HEX_WINS.find(set=>set.every(i=>board[i]==='token'));
      const tri = TRI_WINS.find(set=>set.every(i=>board[i]==='token'));

      if(hex){
        result='win';
        winner='blue';
        winningSet=hex;
      }else if(tri){
        result='win';
        winner='red';
        winningSet=tri;
      }

      return {
        ...state,
        board,
        selected:null,
        moves:[],
        result,
        winner,
        winningSet,
        turn: state.turn==='blue'?'red':'blue'
      };
    }

    // deselect on any non‑legal tap
    return {...state, selected:null, moves:[]};
  }

  // win sets (0‑indexed)
  const TRI_WINS = [
    [0,3,7,6,5,2],   // 1-4-8-7-6-3
    [1,4,8,7,6,3],   // 2-5-9-8-7-4
    [3,7,11,10,9,6]  // 4-8-12-11-10-7
  ];

  const HEX_WINS = [
    [0,1,4,7,6,2],   // 1-2-5-8-7-3
    [2,3,7,10,9,5],  // 3-4-8-11-10-6
    [3,4,8,11,10,6]  // 4-5-9-12-11-7
  ];

  function checkWin(board, type){
    const sets = type === 'triangle' ? TRI_WINS : HEX_WINS;
    return sets.some(set => set.every(i => board[i] === 'token'));
  }

  function getStatus(s){ return {result:s.result,winner:s.winner}; }

  return {initState,applyMove,getStatus};
})();

// ============================================================
// SECTION 7 — UI  ← cartridge
// ============================================================
const ui = (()=>{

  const SVG_NS='http://www.w3.org/2000/svg';

  const ROWS=[2,3,4,3];
  const STEP_X=84;
  const STEP_Y=72.75;
  const RING_R=40;
  const TOKEN_R=33;
  const TOKEN_LIFT_R=40; // when selected it fills the circle
  const DOT_R=16;        // faint destination dot
  // shadow removed per request
  const SHADOW_FILTER='';
  const START_Y=58;
  const CENTER_X=210;

  const POSITIONS=[];
  let idx=0;

  for(let r=0;r<ROWS.length;r++){
    const count=ROWS[r];
    const startX=CENTER_X-((count-1)*STEP_X)/2;

    for(let i=0;i<count;i++){
      POSITIONS[idx++]=[startX+i*STEP_X,START_Y+r*STEP_Y];
    }
  }

  function mkEl(tag,attrs){
    const e=document.createElementNS(SVG_NS,tag);
    for(const[k,v] of Object.entries(attrs)) e.setAttribute(k,v);
    return e;
  }

  let clickHandler=null;
  let tokenNodes=[];
  let dotNodes=[];
  let prevBoard=null;
  let winShape=null;
  let activeAnimationToken=null;

  function buildBoard(onMove){

    clickHandler=onMove;

    const svg=document.getElementById('board-svg');
    svg.setAttribute('viewBox','0 0 420 360');
    svg.innerHTML='';

    tokenNodes=[];
    dotNodes=[];
    prevBoard=null;
    activeAnimationToken=null;
    winShape=null;

    svg.addEventListener('click', (e) => {
      if(e.target === svg) clickHandler(null);
    });

    POSITIONS.forEach(([cx,cy],i)=>{

      const g=document.createElementNS(SVG_NS,'g');

      const ring=mkEl('circle',{
        cx,cy,r:RING_R,
        fill:'#f1f1f1',
        stroke:'#000','stroke-width':4
      });

      const token=mkEl('circle',{
        cx,cy,r:TOKEN_R,
        fill:'#1e3a8a',
        visibility:'hidden'
      });

      const dot=mkEl('circle',{
        cx,cy,r:DOT_R,
        fill:'#1e3a8a',
        opacity:'0.10',
        visibility:'hidden'
      });

      g.appendChild(ring);
      g.appendChild(dot);
      g.appendChild(token);

      g.addEventListener('click',()=>clickHandler(i));

      svg.appendChild(g);

      tokenNodes.push(token);
      dotNodes.push(dot);

    });
  }

  function animateMove(from,to){

    const token=tokenNodes[to];
    activeAnimationToken=token;

    const [x1,y1]=POSITIONS[from];
    const [x2,y2]=POSITIONS[to];
    const dx=x2-x1;
    const dy=y2-y1;
    const dist=Math.hypot(dx,dy);
    const isHop = dist > STEP_X * 1.45;
    const duration = isHop ? 360 : 180;

    token.setAttribute('cx',x1);
    token.setAttribute('cy',y1);
    token.setAttribute('r',TOKEN_R);
    token.style.filter = SHADOW_FILTER;

    const ease = t => 1 - Math.pow(1 - t, 3);
    const start=performance.now();

    function frame(t){
      const raw=Math.min(1,(t-start)/duration);
      const p=ease(raw);
      const x=x1+dx*p;
      const y=y1+dy*p;
      const arc = Math.sin(raw * Math.PI) * (isHop ? 8 : 4);
      const r = TOKEN_R + Math.sin(raw * Math.PI) * 7;

      token.setAttribute('cx',x);
      token.setAttribute('cy',y - arc);
      token.setAttribute('r',r);

      if(raw<1) requestAnimationFrame(frame);
      else{
        token.setAttribute('cx',x2);
        token.setAttribute('cy',y2);
        token.setAttribute('r',TOKEN_R);
        token.style.filter = '';
        activeAnimationToken=null;
      }
    }

    requestAnimationFrame(frame);

  }

  function renderBoard(state){

    const svg=document.getElementById('board-svg');

    if(state.result==='win' && state.winningSet && !winShape){
      drawWinShape(state.winningSet);
    }

    if(prevBoard){
      for(let i=0;i<12;i++){
        if(prevBoard[i]==='token' && state.board[i]==='_'){
          const from=i;
          const to=state.board.findIndex((v,j)=>v==='token' && prevBoard[j]==='_');
          if(to!==-1) animateMove(from,to);
        }
      }
    }

    prevBoard=state.board.slice();

    for(let i=0;i<12;i++){

      const token=tokenNodes[i];
      const dot=dotNodes[i];

      token.setAttribute('visibility',state.board[i]==='token'?'visible':'hidden');

      if(activeAnimationToken !== token){
        if(state.selected===i){
          token.setAttribute('r',TOKEN_LIFT_R);
          token.style.filter = SHADOW_FILTER;
        }else{
          token.setAttribute('r',TOKEN_R);
          token.style.filter = '';
        }
      }

      if(state.moves && state.moves.includes(i)){
        dot.setAttribute('visibility','visible');
      }else{
        dot.setAttribute('visibility','hidden');
      }

    }

  }

  function renderStatus(state,role){

    if(state.result==='win'){
      const name = state.winner==='blue' ? 'Hexagon' : 'Triangle';
      document.getElementById('turn-indicator').textContent = name + ' Wins!';
      document.getElementById('game-status').textContent='';
      document.getElementById('btn-again').classList.remove('hidden');
      return;
    }

    const el=document.getElementById('turn-indicator');

    const roleName = state.turn==='blue' ? 'Hexagon' : 'Triangle';

    if(role==='spectator'){
      // local play on same device
      el.textContent = `${roleName}'s Turn`;
    }else{
      const yourRoleName = role==='blue' ? 'Hexagon' : 'Triangle';
      const oppRoleName  = role==='blue' ? 'Triangle' : 'Hexagon';

      if(role===state.turn){
        el.textContent = `Your Turn (${yourRoleName})`;
      }else{
        el.textContent = `Opponent's Turn (${oppRoleName})`;
      }
    }

    document.getElementById('game-status').textContent='Tap a token, then choose a destination.';

    document.getElementById('btn-again').classList.add('hidden');

  }

  function drawWinShape(set){

    const svg=document.getElementById('board-svg');

    const path=document.createElementNS(SVG_NS,'path');

    const pts=set.map(i=>POSITIONS[i]);

    let d=`M ${pts[0][0]} ${pts[0][1]}`;
    for(let i=1;i<pts.length;i++){
      d+=` L ${pts[i][0]} ${pts[i][1]}`;
    }
    d+=` L ${pts[0][0]} ${pts[0][1]}`;

    path.setAttribute('d',d);
    path.setAttribute('fill','none');
    path.setAttribute('stroke','#cc1111');
    path.setAttribute('stroke-width','6');
    path.setAttribute('stroke-linejoin','round');

    svg.appendChild(path);

    const length=path.getTotalLength();

    path.style.strokeDasharray=length;
    path.style.strokeDashoffset=length;
    path.getBoundingClientRect();

    path.style.transition='stroke-dashoffset 0.4s ease-out';
    path.style.strokeDashoffset='0';

    winShape=path;
  }

  function clearAnimations(){
    prevBoard=null;
    activeAnimationToken=null;
    if(winShape){ winShape.remove(); winShape=null; }
  }

  return {buildBoard,renderBoard,renderStatus,clearAnimations};
})();

// ============================================================
// SECTION 8 — SHELL STARTUP
// ============================================================
(function startup() {
  const screenLobby = document.getElementById('screen-lobby');
  const screenGame  = document.getElementById('screen-game');
  function showLobby() { screenLobby.classList.remove('hidden'); screenGame.classList.add('hidden'); }
  function showGame()  { screenLobby.classList.add('hidden'); screenGame.classList.remove('hidden'); }

  let currentState = null, currentRole = 'spectator', currentGameId = null, isLocal = false;

  function normalizeState(state) {
    if (!state) return state;
    if (state.board && !Array.isArray(state.board)) {
      const arr = [];
      for (let i = 0; i < 12; i++) arr[i] = state.board[i] || '_' ;
      state.board = arr;
    }
    if (!state.scores) state.scores = { blue: 0, red: 0 };
    return state;
  }

  function handleMove(cell) {
    if (!currentState) { console.log('NO STATE'); return; }
    const state = currentState;
    const role = currentRole;
    const isLoc = isLocal;
    console.log('HM cell:', cell, 'turn:', state.turn, 'role:', role, 'local:', isLoc);
    if (isLoc) {
      const next = engine.applyMove(state, cell, 'spectator');
      if (!next) { console.log('LOCAL applyMove null'); return; }
      currentState = next;
      ui.renderBoard(currentState, 'spectator');
      ui.renderStatus(currentState, 'spectator');
      return;
    }
    console.log('REMOTE PATH — about to check turn');
    if (state.turn !== role) { console.log('TURN MISMATCH'); return; }
    console.log('TURN OK — calling applyMove');
    const next = engine.applyMove(state, cell, role);
    console.log('applyMove returned:', next ? 'state' : 'null');
    if (!next) return;
    next.playerBlue = state.playerBlue;
    next.playerRed  = state.playerRed;
    syncAdapter.push(currentGameId, next);
  }

  function startLocalGame() {
    isLocal = true;
    syncAdapter.unsubscribe();
    currentGameId = null;
    const gi = currentState ? (currentState.gameIndex || 0) + 1 : 0;
    currentState = engine.initState(gi);
    currentRole  = 'spectator';
    ui.buildBoard(handleMove);
    ui.renderBoard(currentState, 'spectator');
    ui.renderStatus(currentState, 'spectator');
    showGame();
  }

  function startRemoteGame(gameId, state) {
    isLocal       = false;
    currentGameId = gameId;
    currentState  = normalizeState(state);
    currentRole   = identity.getRole(currentState);
    ui.buildBoard(handleMove);
    ui.renderBoard(currentState, currentRole);
    ui.renderStatus(currentState, currentRole);
    showGame();
    syncAdapter.onStateChange(gameId, remote => {
      currentState = normalizeState(remote);
      currentRole  = identity.getRole(currentState);
      ui.renderBoard(currentState, currentRole);
      ui.renderStatus(currentState, currentRole);
    });
  }

  function createRemoteGame() {
    if (!syncAdapter.ready) { alert("Firebase isn't configured.\n\nFill in Section 2, or use 'Play on This Device'."); return; }
    const gameId = lobby.generateId();
    const state  = engine.initState(0);
    state.playerBlue = identity.id;
    lobby.pushUrlState(gameId);
    document.getElementById('share-url').textContent = lobby.buildShareUrl(gameId);
    document.getElementById('link-panel').classList.add('visible');
    document.getElementById('btn-challenge').classList.add('hidden');
    document.getElementById('lobby-status').textContent = 'Waiting for your friend…';
    syncAdapter.push(gameId, state);
    syncAdapter.onStateChange(gameId, remote => {
      // Use playerRed + gameIndex (always present) to detect join — avoids
      // Firebase null-stripping the empty board array making remote.board falsy
      if (remote.playerRed && remote.gameIndex !== undefined) {
        document.getElementById('lobby-status').textContent = 'Friend joined!';
        syncAdapter.unsubscribe();
        startRemoteGame(gameId, remote);
      }
    });
  }

  function joinRemoteGame(gameId) {
    if (!syncAdapter.ready) { alert("Firebase isn't configured."); showLobby(); return; }
    showLobby();
    document.getElementById('link-panel').classList.add('visible');
    document.getElementById('share-url').textContent = lobby.buildShareUrl(gameId);
    document.getElementById('lobby-status').textContent = 'Joining game…';
    firebase.database().ref('trollhole/' + gameId).once('value').then(snap => {
      if (!snap.exists()) { document.getElementById('lobby-status').textContent = 'Game not found.'; return; }
      const state = snap.val();
      if (state.playerBlue === identity.id) { startRemoteGame(gameId, state); return; }
      if (!state.playerRed) { state.playerRed = identity.id; syncAdapter.push(gameId, state); }
      startRemoteGame(gameId, state);
    }).catch(err => {
      console.error('Join error:', err);
      document.getElementById('lobby-status').textContent = 'Connection error. Please try again.';
    });
  }

  document.getElementById('copy-btn').addEventListener('click', () => {
    navigator.clipboard.writeText(document.getElementById('share-url').textContent).then(() => {
      const b = document.getElementById('copy-btn'); b.textContent = 'Copied!';
      setTimeout(() => b.textContent = 'Copy', 1800);
    });
  });

  document.getElementById('btn-again').addEventListener('click', () => {
    if (isLocal) { startLocalGame(); return; }
    const gi = (currentState.gameIndex || 0) + 1;
    const fresh = engine.initState(gi);
    fresh.playerBlue = currentState.playerBlue;
    fresh.playerRed  = currentState.playerRed;
    syncAdapter.push(currentGameId, fresh);
  });

  document.getElementById('btn-menu').addEventListener('click', () => {
    syncAdapter.unsubscribe(); isLocal = false;
    ui.clearAnimations();
    const u = new URL(window.location.href); u.searchParams.delete('game');
    window.history.replaceState({}, '', u.toString());
    document.getElementById('link-panel').classList.remove('visible');
    document.getElementById('btn-challenge').classList.remove('hidden');
    showLobby();
  });

  document.getElementById('btn-local').addEventListener('click', startLocalGame);
  document.getElementById('btn-challenge').addEventListener('click', createRemoteGame);

  const gid = lobby.getGameIdFromUrl();
  if (gid) joinRemoteGame(gid); else showLobby();
})();
</script>
