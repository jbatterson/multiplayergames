      align-items: center;
      gap: 0.75rem;

    .lobby-divider {

      letter-spacing: 0.2em; text-transform: uppercase;
      color: #999; margin: 0.25rem 0;

      font-family: 'Outfit', sans-serif;

    .link-instructions { font-size: 0.7rem; font-weight: 600; text-align: center; color: #444; }
    .status-line {
      font-size: 0.65rem; font-weight: 900;
      letter-spacing: 0.2em; text-transform: uppercase;
      text-align: center; min-height: 1em;

      flex-direction: column;

    }

      width: 100%; max-width: 400px;
      display: flex; flex-direction: column; gap: 0.75rem;
    }

      font-size: 0.8rem;
      line-height: 1.6;
      text-align: center;
      max-width: 300px;
      margin-bottom: 1.5rem;
      color: #222;
    }
    .c-blue { color: #1a3adb; font-weight: 700; }
    .c-red  { color: #cc1111; font-weight: 700; }
    .circle-fade { opacity: 0.35; transition: opacity 0.35s; }
    .hidden { display: none !important; }
  </style>
</head>

// ============================================================
// SECTION 3 — SYNC ADAPTER
// ============================================================
const syncAdapter = (() => {
  let db = null, activeRef = null, activeHandler = null;
  function init() {
    if (FIREBASE_CONFIG.apiKey === "YOUR_API_KEY") return false;
    try { firebase.initializeApp(FIREBASE_CONFIG); db = firebase.database(); return true; }
    catch(e) { console.error("Firebase init failed:", e); return false; }
  }
  function push(gameId, state) { if (db) db.ref('trollhole/' + gameId).set(state); }
  function onStateChange(gameId, cb) {
    unsubscribe();
    if (!db) return;
    activeRef = db.ref('trollhole/' + gameId);
    activeHandler = activeRef.on('value', snap => { if (snap.exists()) cb(snap.val()); });
  }
  function unsubscribe() {
    if (activeRef && activeHandler) activeRef.off('value', activeHandler);
    activeRef = null; activeHandler = null;
  }
  const ready = init();
  return { push, onStateChange, unsubscribe, ready };
})();

// ============================================================
// SECTION 4 — PLAYER IDENTITY
// ============================================================
const identity = (() => {
  const KEY = 'cb_player_id';
  let id = localStorage.getItem(KEY);
  if (!id) { id = Math.random().toString(36).slice(2, 10); localStorage.setItem(KEY, id); }
  function getRole(state) {
    if (state.playerBlue === id) return 'blue';
    if (state.playerRed  === id) return 'red';
    return 'spectator';
  }
  return { id, getRole };
})();

// ============================================================
// SECTION 5 — LOBBY / URL LOGIC
// ============================================================
const lobby = (() => {
  function generateId() {
    let id = '';
    for (let i = 0; i < CONFIG.gameIdLength; i++)
      id += CONFIG.gameIdChars[Math.floor(Math.random() * CONFIG.gameIdChars.length)];
    return id;
  }
  function getGameIdFromUrl() { return new URLSearchParams(window.location.search).get('game'); }
  function buildShareUrl(gameId) {
    const u = new URL(window.location.href); u.search = ''; u.searchParams.set('game', gameId); return u.toString();
  }
  function pushUrlState(gameId) { window.history.replaceState({}, '', buildShareUrl(gameId)); }
  return { generateId, getGameIdFromUrl, buildShareUrl, pushUrlState };
})();

// ============================================================
// SECTION 6 — GAME ENGINE  ← cartridge
// ============================================================
const engine = (() => {

  const NEIGHBORS = {
    0:[1,3,4],   1:[0,2,4,5],   2:[1,5,6],
    3:[0,4,7,8], 4:[0,1,3,5,8,9], 5:[1,2,4,6,9,10], 6:[2,5,10,11],
    7:[3,8,12],  8:[3,4,7,9,12,13], 9:[4,5,8,10,13,14], 10:[5,6,9,11,14,15], 11:[6,10,15],
    12:[7,8,13,16], 13:[8,9,12,14,16,17], 14:[9,10,13,15,17,18], 15:[10,11,14,18],
    16:[12,13,17], 17:[13,14,16,18], 18:[14,15,17]
  };

  function initState(gameIndex) {
    return {
      board: Array(19).fill(null),
      turn: gameIndex % 2 === 0 ? 'blue' : 'red',
      round: 1,
      placements: 0,
      result: 'playing',
      winner: null,
      scores: { blue: 0, red: 0 },
      trollIndex: null,
      playerBlue: null,
      playerRed: null,
      gameIndex: gameIndex,
    };
  }

  function applyMove(state, cell, player) {
    if (state.result !== 'playing') return null;
    if (player && player !== 'spectator' && state.turn !== player) return null;

    // Firebase strips all-null arrays entirely — always rebuild safely
    const raw = state.board;
    const boardArr = Array.from({length: 19}, (_, i) =>
      (raw && raw[i] && typeof raw[i] === 'object') ? raw[i] : null
    );

    if (boardArr[cell]) return null;

    const board = boardArr.map(c => c ? {...c} : null);
    board[cell] = { number: state.round, color: state.turn, crossed: false };

    let turn = state.turn === 'blue' ? 'red' : 'blue';
    let placements = state.placements + 1;
    let round = state.round;
    let result = 'playing';
    let winner = null;
    let scores = { blue: 0, red: 0 };
    let trollIndex = null;

    if (placements === 2) { placements = 0; round++; }

    if (round === 10 && placements === 0) {
      trollIndex = board.findIndex(c => !c);
      const eaten = NEIGHBORS[trollIndex];
      for (const n of eaten) { if (board[n]) board[n].crossed = true; }
      for (const c of board) { if (c && !c.crossed) scores[c.color] += c.number; }
      result = 'finished';
      if (scores.blue > scores.red) winner = 'blue';
      else if (scores.red > scores.blue) winner = 'red';
      else winner = 'tie';
    }

    return { ...state, board, turn, round, placements, result, winner, scores, trollIndex };
  }

  function getStatus(s) { return { result: s.result, winner: s.winner }; }

  return { initState, applyMove, getStatus, NEIGHBORS };
})();

    fg.appendChild(p('M33.99,133.62c8.71,8.18,24.38,13.63,42.26,13.63,18.8,0,35.15-6.03,43.54-14.91-8.71-8.18-24.38-13.63-42.26-13.63-18.8,0-35.15,6.03-43.54,14.91Z', '#ffffff'));
    fg.appendChild(el(58.48, 20, 10.24, 8.55, '#ffffff', 'translate(14.2 63.12) rotate(-63.12)'));
    fg.appendChild(p('M117.76,105.38s3.55,8.15,3.1,12.21c-.45,4.07,4.87,2.23,6.21,1.31s5.63-10.65,2.76-16.75l-12.07,3.23Z', '#ffffff'));
    fg.appendChild(p('M32.15,106.84s-3.63,8.97-3.38,13.48-4.61,2.39-5.82,1.36-4.8-11.88-1.88-18.59l11.08,3.75Z', '#ffffff'));
    g.appendChild(fg);
    return g;
  }

  function buildBoard(onMove) {
    onMoveCb = onMove;
    hoverIndex = null;
    currentState = null;
    currentRole = null;

    const svg = document.getElementById('board-svg');
    svg.innerHTML = '';

    for (let i = 0; i < POSITIONS.length; i++) {
      const [cx, cy] = POSITIONS[i];
      const g = document.createElementNS(SVG_NS, 'g');

      const circle = mkEl('circle', { cx, cy, r: 28, fill: '#eee', style: 'cursor:pointer' });
      circle.addEventListener('click', () => onMoveCb(i));
      circle.addEventListener('mouseenter', () => { if (lastWasTouch) return; hoverIndex = i; renderPreview(); });
      circle.addEventListener('mouseleave', () => { if (lastWasTouch) return; hoverIndex = null; renderPreview(); });

      const text = mkEl('text', {
        x: cx, y: cy + 6, 'text-anchor': 'middle',
        'font-family': 'Outfit,sans-serif', 'font-size': 18,
        'font-weight': 900, 'pointer-events': 'none'
      });

      const face = buildTrollFace(cx, cy);

      g.appendChild(circle);
      g.appendChild(text);
      g.appendChild(face);
      svg.appendChild(g);
    }

    svg.addEventListener('click', e => { if (e.target === svg) { hoverIndex = null; renderPreview(); } });
    document.addEventListener('touchstart', () => { lastWasTouch = true; }, { passive: true });
    document.addEventListener('mousemove', () => { lastWasTouch = false; });
  }

  function clearAnimations() {
    animationTimers.forEach(id => clearTimeout(id));
    animationTimers = [];
    endAnimatedKey = null;
  }

  function renderBoard(state, role) {
    if (!state) return;
    currentState = state;
    currentRole = role;

    const svg = document.getElementById('board-svg');
    const nodes = svg.children;

    for (let i = 0; i < nodes.length; i++) {
      const g = nodes[i];
      const circle = g.children[0];
      const text = g.children[1];
      const face = g.children[2];

      text.removeAttribute('opacity');
      face.setAttribute('visibility', 'hidden');
      circle.classList.remove('circle-fade');

      const raw = state.board ? state.board[i] : null;
      const cell = raw && typeof raw === 'object' ? raw : null;

      if (!cell) {
        text.textContent = '';
        text.setAttribute('fill', '#000');
        circle.setAttribute('fill', '#eee');
      } else {
        text.textContent = cell.number;
        text.setAttribute('fill', '#fff');
        circle.setAttribute('fill', cell.color === 'blue' ? '#1a3adb' : '#cc1111');
        if (cell.crossed) circle.classList.add('circle-fade');
      }
    }

    renderPreview();

    if (state.result === 'finished') {
      const animKey = JSON.stringify(state.trollIndex) + state.result;
      if (endAnimatedKey !== animKey) {
        clearAnimations();
        animateEnd(state);
        endAnimatedKey = animKey;
      }
    } else {
      clearAnimations();
    }
  }

  function renderPreview() {
    const svg = document.getElementById('board-svg');
    if (!svg || !currentState) return;
    const nodes = svg.children;

    for (let i = 0; i < nodes.length; i++) {
      const text = nodes[i].children[1];
      if (!currentState.board || !currentState.board[i]) {
        text.textContent = '';
        text.removeAttribute('opacity');
      }
    }

    if (currentState.result !== 'playing') return;
    if (hoverIndex === null) return;
    const raw = currentState.board ? currentState.board[hoverIndex] : null;
    if (raw) return;

    if (currentRole !== 'spectator' && currentRole !== currentState.turn) return;

    const text = nodes[hoverIndex].children[1];
    text.textContent = currentState.round;
    text.setAttribute('fill', currentState.turn === 'blue' ? '#1a3adb' : '#cc1111');
    text.setAttribute('opacity', '0.4');
  }

  function animateEnd(state) {
    const svg = document.getElementById('board-svg');
    if (!svg) return;
    const nodes = svg.children;
    const troll = state.trollIndex;
    if (troll === null || troll === undefined) return;

    const g = nodes[troll];
    const circle = g.children[0];
    const face = g.children[2];

    animationTimers.push(setTimeout(() => { circle.setAttribute('fill', '#3aa655'); }, 200));
    animationTimers.push(setTimeout(() => { face.setAttribute('visibility', 'visible'); }, 500));

    const eaten = engine.NEIGHBORS[troll];
    let delay = 800;
    for (const n of eaten) {
      const gn = nodes[n];
      const c = gn.children[0];
      animationTimers.push(setTimeout(() => { c.classList.add('circle-fade'); }, delay));
      delay += 250;
    }
  }

  function renderStatus(state, role) {
    const ind = document.getElementById('turn-indicator');
    const gs = document.getElementById('game-status');
    const btnAgain = document.getElementById('btn-again');
    const cw = c => `<span class="color-${c}">${c.toUpperCase()}</span>`;

    if (state.result === 'playing') {
      btnAgain.classList.add('hidden');
      gs.textContent = '';
      const t = state.turn;
      if (role === 'spectator')  ind.innerHTML = `${cw(t)}: Place ${state.round}`;
      else if (t === role)       ind.innerHTML = `Your turn, ${cw(role)}: Place ${state.round}`;
      else                       ind.innerHTML = `Opponent's turn — ${cw(t)}: Place ${state.round}`;
    } else {
      ind.innerHTML = '';
      btnAgain.classList.remove('hidden');
      if (state.winner === 'tie') {
        gs.innerHTML = `Tie — <span class="color-blue">Blue ${state.scores.blue}</span> / <span class="color-red">Red ${state.scores.red}</span>`;
      } else {
        const w = state.winner;
        const ws = w === 'blue' ? state.scores.blue : state.scores.red;
        const ls = w === 'blue' ? state.scores.red : state.scores.blue;
        if (role === 'spectator') gs.innerHTML = `${cw(w)} wins! ${ws}–${ls}`;
        else if (w === role)      gs.innerHTML = `You win! ${ws}–${ls}`;
        else                      gs.innerHTML = `You lose. ${ws}–${ls}`;
      }
    }
  }

  return { buildBoard, renderBoard, renderStatus, clearAnimations };
})();

// ============================================================
// SECTION 8 — SHELL STARTUP
// ============================================================
(function startup() {
  const screenLobby = document.getElementById('screen-lobby');
  const screenGame  = document.getElementById('screen-game');
  function showLobby() { screenLobby.classList.remove('hidden'); screenGame.classList.add('hidden'); }
  function showGame()  { screenLobby.classList.add('hidden'); screenGame.classList.remove('hidden'); }

  let currentState = null, currentRole = 'spectator', currentGameId = null, isLocal = false;

  function normalizeState(state) {
    if (!state) return state;
    if (state.board && !Array.isArray(state.board)) {
      const arr = [];
      for (let i = 0; i < 19; i++) arr[i] = state.board[i] || null;
      state.board = arr;
    }
    if (!state.scores) state.scores = { blue: 0, red: 0 };
    return state;
  }

  function handleMove(cell) {
    if (!currentState) { console.log('NO STATE'); return; }
    const state = currentState;
    const role = currentRole;
    const isLoc = isLocal;
    console.log('HM cell:', cell, 'turn:', state.turn, 'role:', role, 'local:', isLoc);
    if (isLoc) {
      const next = engine.applyMove(state, cell, 'spectator');
      if (!next) { console.log('LOCAL applyMove null'); return; }
      currentState = next;
      ui.renderBoard(currentState, 'spectator');
      ui.renderStatus(currentState, 'spectator');
      return;
    }
    console.log('REMOTE PATH — about to check turn');
    if (state.turn !== role) { console.log('TURN MISMATCH'); return; }
    console.log('TURN OK — calling applyMove');
    const next = engine.applyMove(state, cell, role);
    console.log('applyMove returned:', next ? 'state' : 'null');
    if (!next) return;
    next.playerBlue = state.playerBlue;
    next.playerRed  = state.playerRed;
    syncAdapter.push(currentGameId, next);
  }

  function startLocalGame() {
    isLocal = true;
    syncAdapter.unsubscribe();
    currentGameId = null;
    const gi = currentState ? (currentState.gameIndex || 0) + 1 : 0;
    currentState = engine.initState(gi);
    currentRole  = 'spectator';
    ui.buildBoard(handleMove);
    ui.renderBoard(currentState, 'spectator');
    ui.renderStatus(currentState, 'spectator');
    showGame();
  }

  function startRemoteGame(gameId, state) {
    isLocal       = false;
    currentGameId = gameId;
    currentState  = normalizeState(state);
    currentRole   = identity.getRole(currentState);
    ui.buildBoard(handleMove);
    ui.renderBoard(currentState, currentRole);
    ui.renderStatus(currentState, currentRole);
    showGame();
    syncAdapter.onStateChange(gameId, remote => {
      currentState = normalizeState(remote);
      currentRole  = identity.getRole(currentState);
      ui.renderBoard(currentState, currentRole);
      ui.renderStatus(currentState, currentRole);
    });
  }

  function createRemoteGame() {
    if (!syncAdapter.ready) { alert("Firebase isn't configured.\n\nFill in Section 2, or use 'Play on This Device'."); return; }
    const gameId = lobby.generateId();
    const state  = engine.initState(0);
    state.playerBlue = identity.id;
    lobby.pushUrlState(gameId);
    document.getElementById('share-url').textContent = lobby.buildShareUrl(gameId);
    document.getElementById('link-panel').classList.add('visible');
    document.getElementById('btn-challenge').classList.add('hidden');
    document.getElementById('lobby-status').textContent = 'Waiting for your friend…';
    syncAdapter.push(gameId, state);
    syncAdapter.onStateChange(gameId, remote => {
      // Use playerRed + gameIndex (always present) to detect join — avoids
      // Firebase null-stripping the empty board array making remote.board falsy
      if (remote.playerRed && remote.gameIndex !== undefined) {
        document.getElementById('lobby-status').textContent = 'Friend joined!';
        syncAdapter.unsubscribe();
        startRemoteGame(gameId, remote);
      }
    });
  }

  function joinRemoteGame(gameId) {
    if (!syncAdapter.ready) { alert("Firebase isn't configured."); showLobby(); return; }
    showLobby();
    document.getElementById('link-panel').classList.add('visible');
    document.getElementById('share-url').textContent = lobby.buildShareUrl(gameId);
    document.getElementById('lobby-status').textContent = 'Joining game…';
    firebase.database().ref('trollhole/' + gameId).once('value').then(snap => {
      if (!snap.exists()) { document.getElementById('lobby-status').textContent = 'Game not found.'; return; }
      const state = snap.val();
      if (state.playerBlue === identity.id) { startRemoteGame(gameId, state); return; }
      if (!state.playerRed) { state.playerRed = identity.id; syncAdapter.push(gameId, state); }
      startRemoteGame(gameId, state);
    }).catch(err => {
      console.error('Join error:', err);
      document.getElementById('lobby-status').textContent = 'Connection error. Please try again.';
    });
  }

  document.getElementById('copy-btn').addEventListener('click', () => {
    navigator.clipboard.writeText(document.getElementById('share-url').textContent).then(() => {
      const b = document.getElementById('copy-btn'); b.textContent = 'Copied!';
      setTimeout(() => b.textContent = 'Copy', 1800);
    });
  });

  document.getElementById('btn-again').addEventListener('click', () => {
    if (isLocal) { startLocalGame(); return; }
    const gi = (currentState.gameIndex || 0) + 1;
    const fresh = engine.initState(gi);
    fresh.playerBlue = currentState.playerBlue;
    fresh.playerRed  = currentState.playerRed;
    syncAdapter.push(currentGameId, fresh);
  });

  document.getElementById('btn-menu').addEventListener('click', () => {
    syncAdapter.unsubscribe(); isLocal = false;
    ui.clearAnimations();
    const u = new URL(window.location.href); u.searchParams.delete('game');
    window.history.replaceState({}, '', u.toString());
    document.getElementById('link-panel').classList.remove('visible');
    document.getElementById('btn-challenge').classList.remove('hidden');
    showLobby();
  });

  document.getElementById('btn-local').addEventListener('click', startLocalGame);
  document.getElementById('btn-challenge').addEventListener('click', createRemoteGame);

  const gid = lobby.getGameIdFromUrl();
  if (gid) joinRemoteGame(gid); else showLobby();
})();
</script>
