<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Tac-Toe</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;900&display=swap" rel="stylesheet" />

  <!--
  ============================================================
  SETUP INSTRUCTIONS
  ============================================================
  1. Go to https://console.firebase.google.com
  2. Click "Add project", give it a name, disable Analytics,
     and click through to create.
  3. In the left sidebar, click "Build" > "Realtime Database".
  4. Click "Create Database", choose any region, and when
     prompted for security rules choose "Start in test mode".
  5. In the left sidebar, click the gear icon > "Project settings".
  6. Scroll to "Your apps", click the </> (Web) icon, register
     an app (any nickname), and copy the firebaseConfig object.
  7. Paste your config values into the FIREBASE CONFIG section
     below, replacing each placeholder string.
  ============================================================
  -->

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background: #fff;
      color: #000;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 28px 16px 40px;
      overflow-x: hidden;
    }

    .game-container {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .title {
      font-weight: 900;
      font-size: 2.25rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }

    .btn {
      width: 100%;
      padding: 1rem 0;
      border: 2px solid #000;
      background: #fff;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
    }
    .btn:hover:not(:disabled) { background: #000; color: #fff; }
    .btn:disabled { opacity: 0.2; cursor: not-allowed; }

    .btn-primary {
      background: #000;
      color: #fff;
      font-weight: 900;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
    }
    .btn-primary:hover:not(:disabled) { background: #333; }

    /* --- Lobby --- */
    #screen-lobby {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    .lobby-divider {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #999;
      margin: 0.25rem 0;
    }

    #link-panel {
      width: 100%;
      border: 2px solid #000;
      padding: 1rem;
      display: none;
      flex-direction: column;
      gap: 0.75rem;
    }
    #link-panel.visible { display: flex; }

    .link-box { display: flex; gap: 0.5rem; align-items: stretch; }

    #share-url {
      flex: 1;
      border: 2px solid #000;
      padding: 0.5rem 0.75rem;
      font-family: 'Outfit', sans-serif;
      font-size: 0.7rem;
      color: #000;
      background: #f9f9f9;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #copy-btn { width: auto; padding: 0 1rem; flex-shrink: 0; font-size: 0.65rem; }

    .status-line {
      font-size: 0.65rem;
      font-weight: 900;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-align: center;
      min-height: 1em;
    }

    /* --- Game screen --- */
    #screen-game {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .turn-indicator {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
      margin-bottom: 1.5rem;
      min-height: 3.5rem;
      justify-content: center;
    }

    .turn-label {
      font-size: 0.65rem;
      font-weight: 900;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .turn-symbol {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2.5rem;
      height: 2.5rem;
      background: #FFD600;
    }

    #board-wrapper {
      box-shadow: 0 0 0 2px #000;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      width: 100%;
      max-width: 320px;
      aspect-ratio: 1;
      margin-bottom: 1.5rem;
    }

    .cell {
      border: 2px solid #000;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      aspect-ratio: 1;
    }
    .cell:hover { background: #fafafa; }

    /* Remove doubled borders */
    .cell:nth-child(1), .cell:nth-child(2), .cell:nth-child(3) { border-top: none; }
    .cell:nth-child(1), .cell:nth-child(4), .cell:nth-child(7) { border-left: none; }
    .cell:nth-child(3), .cell:nth-child(6), .cell:nth-child(9) { border-right: none; }
    .cell:nth-child(7), .cell:nth-child(8), .cell:nth-child(9) { border-bottom: none; }

    .mark { width: 52%; height: 52%; pointer-events: none; }

    .game-controls {
      width: 100%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="game-container">
  <h1 class="title">Tic-Tac-Toe</h1>

  <!-- LOBBY SCREEN -->
  <div id="screen-lobby">
    <button class="btn" id="btn-local">Play on This Device</button>
    <div class="lobby-divider">or</div>
    <button class="btn" id="btn-challenge">Challenge a Friend</button>
    <div id="link-panel">
      <div class="link-box">
        <div id="share-url"></div>
        <button class="btn" id="copy-btn">Copy</button>
      </div>
      <div class="status-line" id="lobby-status"></div>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="screen-game" class="hidden">
    <div class="turn-indicator">
      <div class="turn-label" id="turn-label"></div>
      <div class="turn-symbol" id="turn-symbol"></div>
    </div>
    <div id="board-wrapper"></div>
    <div class="game-controls">
      <div class="status-line" id="game-status"></div>
      <button class="btn btn-primary hidden" id="btn-again">Play Again</button>
      <button class="btn" id="btn-menu">Back to Menu</button>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
"use strict";

// ============================================================
// SECTION 1 — CONFIG / CONSTANTS
// ============================================================
const CONFIG = {
  gameIdLength: 4,
  gameIdChars: 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789',
};

// ============================================================
// SECTION 2 — FIREBASE CONFIG
// Replace placeholder values with your own project's config.
// Found in: Firebase Console > Project Settings > Your Apps
// ============================================================
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyDrnan5rxxGwcCpS3tnB68OSTG6toQOL6A",
  authDomain:        "multiplayer-tic-tac-toe-1611a.firebaseapp.com",
  databaseURL:       "https://multiplayer-tic-tac-toe-1611a-default-rtdb.firebaseio.com",
  projectId:         "multiplayer-tic-tac-toe-1611a",
  storageBucket:     "multiplayer-tic-tac-toe-1611a.firebasestorage.app",
  messagingSenderId: "896542207536",
  appId:             "1:896542207536:web:6dd25e3b8950dc65ec47f5",
};

// ============================================================
// SECTION 3 — SYNC ADAPTER
// All Firebase-specific code lives here.
// To swap backends, replace only this section.
//
// Interface:
//   syncAdapter.push(gameId, state)
//   syncAdapter.onStateChange(gameId, cb)
//   syncAdapter.unsubscribe()
//   syncAdapter.ready  (boolean)
// ============================================================
const syncAdapter = (() => {
  let db = null;
  let activeRef = null;
  let activeHandler = null;

  function init() {
    if (FIREBASE_CONFIG.apiKey === "YOUR_API_KEY") return false;
    try {
      firebase.initializeApp(FIREBASE_CONFIG);
      db = firebase.database();
      return true;
    } catch(e) {
      console.error("Firebase init failed:", e);
      return false;
    }
  }

  function push(gameId, state) {
    if (!db) return;
    db.ref('games/' + gameId).set(state);
  }

  function onStateChange(gameId, cb) {
    if (!db) return;
    unsubscribe();
    activeRef = db.ref('games/' + gameId);
    activeHandler = activeRef.on('value', snap => {
      if (snap.exists()) cb(snap.val());
    });
  }

  function unsubscribe() {
    if (activeRef && activeHandler) {
      activeRef.off('value', activeHandler);
    }
    activeRef = null;
    activeHandler = null;
  }

  const ready = init();
  return { push, onStateChange, unsubscribe, ready };
})();

// ============================================================
// SECTION 4 — PLAYER IDENTITY
// Random player ID stored in localStorage.
// ============================================================
const identity = (() => {
  const KEY = 'ttt_player_id';
  let id = localStorage.getItem(KEY);
  if (!id) {
    id = Math.random().toString(36).slice(2, 10);
    localStorage.setItem(KEY, id);
  }
  function getRole(state) {
    if (state.playerX === id) return 'X';
    if (state.playerO === id) return 'O';
    return 'spectator';
  }
  return { id, getRole };
})();

// ============================================================
// SECTION 5 — LOBBY / URL LOGIC
// ============================================================
const lobby = (() => {
  function generateId() {
    let id = '';
    for (let i = 0; i < CONFIG.gameIdLength; i++) {
      id += CONFIG.gameIdChars[Math.floor(Math.random() * CONFIG.gameIdChars.length)];
    }
    return id;
  }

  function getGameIdFromUrl() {
    return new URLSearchParams(window.location.search).get('game');
  }

  function buildShareUrl(gameId) {
    const u = new URL(window.location.href);
    u.search = '';
    u.searchParams.set('game', gameId);
    return u.toString();
  }

  function pushUrlState(gameId) {
    window.history.replaceState({}, '', buildShareUrl(gameId));
  }

  return { generateId, getGameIdFromUrl, buildShareUrl, pushUrlState };
})();

// ============================================================
// SECTION 6 — GAME ENGINE  ← cartridge
// Pure functions. No DOM, no network.
// ============================================================
const engine = (() => {
  const WIN_LINES = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6],
  ];

  function initState() {
    return {
      board:   [null,null,null,null,null,null,null,null,null],
      turn:    'X',
      result:  'playing',
      winner:  null,
      playerX: null,
      playerO: null,
    };
  }

  function applyMove(state, index, player) {
    if (state.result !== 'playing') return null;
    if (state.turn !== player)      return null;
    if (state.board[index] !== null) return null;

    const board = state.board.slice();
    board[index] = player;

    for (const [a,b,c] of WIN_LINES) {
      if (board[a] && board[a] === board[b] && board[b] === board[c]) {
        return { ...state, board, result: 'win', winner: player };
      }
    }
    if (board.every(sq => sq !== null)) {
      return { ...state, board, result: 'draw', winner: null };
    }
    return { ...state, board, turn: player === 'X' ? 'O' : 'X' };
  }

  function getStatus(state) {
    return { result: state.result, winner: state.winner };
  }

  return { initState, applyMove, getStatus };
})();

// ============================================================
// SECTION 7 — UI  ← cartridge
// Renders state to DOM. Fires onMove(index) on player input.
// ============================================================
const ui = (() => {
  function svgX() {
    const s = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    s.setAttribute('viewBox', '0 0 100 100');
    s.classList.add('mark');
    for (const [x1,y1,x2,y2] of [[18,18,82,82],[82,18,18,82]]) {
      const l = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      l.setAttribute('x1',x1); l.setAttribute('y1',y1);
      l.setAttribute('x2',x2); l.setAttribute('y2',y2);
      l.setAttribute('stroke','#000');
      l.setAttribute('stroke-width','12');
      l.setAttribute('stroke-linecap','round');
      s.appendChild(l);
    }
    return s;
  }

  function svgO() {
    const s = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    s.setAttribute('viewBox', '0 0 100 100');
    s.classList.add('mark');
    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    c.setAttribute('cx','50'); c.setAttribute('cy','50'); c.setAttribute('r','34');
    c.setAttribute('fill','none');
    c.setAttribute('stroke','#000');
    c.setAttribute('stroke-width','12');
    s.appendChild(c);
    return s;
  }

  function markerFor(player) {
    return player === 'X' ? svgX() : svgO();
  }

  function buildBoard(onMove) {
    const wrapper = document.getElementById('board-wrapper');
    wrapper.innerHTML = '';
    for (let i = 0; i < 9; i++) {
      const cell = document.createElement('div');
      cell.classList.add('cell');
      cell.dataset.index = i;
      cell.addEventListener('click', () => onMove(i));
      wrapper.appendChild(cell);
    }
  }

  function renderBoard(state) {
    if (!state || !state.board) return;  // not ready yet

    const board = Array.isArray(state.board)
      ? state.board
      : Object.values(state.board);   // normalize Firebase object → array

    const cells = document.querySelectorAll('.cell');
    cells.forEach((cell, i) => {
      if (cell.children.length === 0 && board[i]) {
        cell.appendChild(markerFor(board[i]));
      }
    });
  }

  function renderStatus(state, role) {
    const turnLabel  = document.getElementById('turn-label');
    const turnSymbol = document.getElementById('turn-symbol');
    const gameStatus = document.getElementById('game-status');
    const btnAgain   = document.getElementById('btn-again');

    turnSymbol.innerHTML = '';

    if (state.result === 'playing') {
      btnAgain.classList.add('hidden');
      gameStatus.textContent = '';
      if (role === 'spectator') {
        turnLabel.textContent = state.turn + "'s Turn";
        turnSymbol.appendChild(markerFor(state.turn));
      } else if (state.turn === role) {
        turnLabel.textContent = 'Your Turn';
        turnSymbol.appendChild(markerFor(role));
      } else {
        turnLabel.textContent = "Friend's Turn";
        turnSymbol.appendChild(markerFor(state.turn));
      }
    } else {
      turnLabel.textContent = '';
      btnAgain.classList.remove('hidden');
      if (state.result === 'draw') {
        gameStatus.textContent = 'Draw!';
      } else if (role === 'spectator') {
        gameStatus.textContent = state.winner + ' Wins!';
      } else if (state.winner === role) {
        gameStatus.textContent = 'You Win!';
      } else {
        gameStatus.textContent = 'You Lose.';
      }
    }
  }

  return { buildBoard, renderBoard, renderStatus, markerFor };
})();

// ============================================================
// SECTION 8 — SHELL STARTUP
// Wires everything together. Should not need changes between games.
// ============================================================
(function startup() {
  const screenLobby = document.getElementById('screen-lobby');
  const screenGame  = document.getElementById('screen-game');

  function showLobby() {
    screenLobby.classList.remove('hidden');
    screenGame.classList.add('hidden');
  }

  function showGame() {
    screenLobby.classList.add('hidden');
    screenGame.classList.remove('hidden');
  }

  let currentState  = null;
  let currentRole   = 'X';
  let currentGameId = null;
  let isLocal       = false;

  // --- Normalize state from Firebase ---
  // Firebase converts arrays to objects with numeric keys on retrieval.
  // This ensures board is always a real JS array.
  function normalizeState(state) {
    if (!state) return state;
    if (!state.board) return state;
    if (!Array.isArray(state.board)) {
      state.board = Object.values(state.board);
    }
    return state;
  }

  // --- Handle a move ---
  function handleMove(index) {
    if (!currentState) return;

    if (isLocal) {
      const next = engine.applyMove(currentState, index, currentState.turn);
      if (!next) return;
      currentState = next;
      ui.renderBoard(currentState);
      ui.renderStatus(currentState, currentState.turn === 'X' ? 'O' : 'X');
      if (currentState.result !== 'playing') {
        ui.renderStatus(currentState, 'spectator');
      }
      return;
    }

    if (currentState.turn !== currentRole) return;
    const next = engine.applyMove(currentState, index, currentRole);
    if (!next) return;
    next.playerX = currentState.playerX;
    next.playerO = currentState.playerO;
    syncAdapter.push(currentGameId, next);
  }

  // --- Local game ---
  function startLocalGame() {
    isLocal = true;
    syncAdapter.unsubscribe();
    currentGameId = null;
    currentState  = engine.initState();
    currentRole   = 'X';
    ui.buildBoard(handleMove);
    ui.renderBoard(currentState);
    ui.renderStatus(currentState, 'spectator');
    showGame();
  }

  // --- Remote game ---
  function startRemoteGame(gameId, state) {
    isLocal        = false;
    currentGameId  = gameId;
    currentState   = normalizeState(state);
    currentRole    = identity.getRole(currentState);
    ui.buildBoard(handleMove);
    ui.renderBoard(currentState);
    ui.renderStatus(currentState, currentRole);
    showGame();

    syncAdapter.onStateChange(gameId, remoteState => {
      currentState = normalizeState(remoteState);
      currentRole  = identity.getRole(currentState);
      ui.renderBoard(currentState);
      ui.renderStatus(currentState, currentRole);
    });
  }

  // --- Create remote game (Player 1) ---
  function createRemoteGame() {
    if (!syncAdapter.ready) {
      alert("Firebase isn't configured yet.\n\nFill in your Firebase config in Section 2, or use 'Play on This Device'.");
      return;
    }
    const gameId = lobby.generateId();
    const state  = engine.initState();
    state.playerX = identity.id;
    lobby.pushUrlState(gameId);

    document.getElementById('share-url').textContent = lobby.buildShareUrl(gameId);
    document.getElementById('link-panel').classList.add('visible');
    document.getElementById('lobby-status').textContent = 'Waiting for your friend…';

    syncAdapter.push(gameId, state);

    syncAdapter.onStateChange(gameId, remoteState => {
      console.log('Player 1 listener fired:', JSON.stringify(remoteState));
      if (remoteState.playerO && remoteState.board) {
        document.getElementById('lobby-status').textContent = 'Friend joined!';
        syncAdapter.unsubscribe();
        startRemoteGame(gameId, remoteState);
      }
    });
  }

  // --- Join remote game (Player 2) ---
  function joinRemoteGame(gameId) {
    if (!syncAdapter.ready) {
      alert("Firebase isn't configured yet.");
      showLobby();
      return;
    }

    showLobby();
    document.getElementById('link-panel').classList.add('visible');
    document.getElementById('share-url').textContent = lobby.buildShareUrl(gameId);
    document.getElementById('lobby-status').textContent = 'Joining game…';

    const ref = firebase.database().ref('games/' + gameId);
    ref.once('value').then(snap => {
      if (!snap.exists()) {
        document.getElementById('lobby-status').textContent = 'Game not found. The link may be expired.';
        return;
      }
      const state = snap.val();
      console.log('Joined, state from Firebase:', JSON.stringify(state));

      if (state.playerX === identity.id) {
        // This player created the game — go straight in
        startRemoteGame(gameId, state);
        return;
      }

      if (!state.playerO) {
        state.playerO = identity.id;
        syncAdapter.push(gameId, state);
      }

      startRemoteGame(gameId, state);

    }).catch(err => {
      console.error('Join error:', err);
      document.getElementById('lobby-status').textContent = 'Connection error. Please try again.';
    });
  }

  // --- Buttons ---
  document.getElementById('copy-btn').addEventListener('click', () => {
    const url = document.getElementById('share-url').textContent;
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 1800);
    });
  });

  document.getElementById('btn-again').addEventListener('click', () => {
    if (isLocal) {
      startLocalGame();
    } else {
      const fresh = engine.initState();
      fresh.playerX = currentState.playerX;
      fresh.playerO = currentState.playerO;
      syncAdapter.push(currentGameId, fresh);
    }
  });

  document.getElementById('btn-menu').addEventListener('click', () => {
    syncAdapter.unsubscribe();
    isLocal = false;
    const u = new URL(window.location.href);
    u.searchParams.delete('game');
    window.history.replaceState({}, '', u.toString());
    document.getElementById('link-panel').classList.remove('visible');
    showLobby();
  });

  document.getElementById('btn-local').addEventListener('click', startLocalGame);
  document.getElementById('btn-challenge').addEventListener('click', createRemoteGame);

  // --- Entry point ---
  const gameIdFromUrl = lobby.getGameIdFromUrl();
  if (gameIdFromUrl) {
    joinRemoteGame(gameIdFromUrl);
  } else {
    showLobby();
  }

})();
</script>
</body>
</html>
