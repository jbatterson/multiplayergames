<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Tac-Toe</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;900&display=swap" rel="stylesheet" />

  <style>
    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      margin-bottom: 1.5rem;
    }
    .header-side {
      width: 32px;
      display: flex;
      align-items: center;
    }
    .home-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .home-btn:hover { opacity: 0.5; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background: #fff;
      color: #000;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 28px 16px 40px;
      overflow-x: hidden;
    }

    .game-container {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .title {
      font-weight: 900;
      font-size: clamp(1.2rem, 5vw, 1.8rem);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin: 0;
      text-align: center;
    }

    .btn {
      width: 100%;
      padding: 1rem 0;
      border: 2px solid #000;
      background: #fff;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
    }
    .btn:hover:not(:disabled) { background: #000; color: #fff; }
    .btn:disabled { opacity: 0.2; cursor: not-allowed; }

    .btn-primary {
      background: #000;
      color: #fff;
      font-weight: 900;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
    }
    .btn-primary:hover:not(:disabled) { background: #333; }

    .instructions {
      font-size: 0.8rem;
      line-height: 1.6;
      text-align: center;
      max-width: 300px;
      margin-bottom: 1.5rem;
      color: #222;
    }
    #screen-lobby {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    .lobby-divider {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #999;
      margin: 0.25rem 0;
    }

    #link-panel {
      width: 100%;
      border: 2px solid #000;
      padding: 1rem;
      display: none;
      flex-direction: column;
      gap: 0.75rem;
    }
    #link-panel.visible { display: flex; }

    .link-box { display: flex; gap: 0.5rem; align-items: stretch; }

    #share-url {
      flex: 1;
      border: 2px solid #000;
      padding: 0.5rem 0.75rem;
      font-family: 'Outfit', sans-serif;
      font-size: 0.7rem;
      color: #000;
      background: #f9f9f9;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #copy-btn { width: auto; padding: 0 1rem; flex-shrink: 0; font-size: 0.65rem; }

    .status-line {
      font-size: 0.65rem;
      font-weight: 900;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-align: center;
      min-height: 1em;
    }

    /* --- Game screen --- */
    #screen-game {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .player-badge {
      font-size: 0.65rem;
      font-weight: 900;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .player-badge-symbol {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.5rem;
      height: 1.5rem;
      background: #FFD600;
    }

    .turn-indicator {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
      margin-bottom: 1.5rem;
      min-height: 3.5rem;
      justify-content: center;
    }

    .turn-label {
      font-size: 0.65rem;
      font-weight: 900;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .turn-symbol {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2.5rem;
      height: 2.5rem;
      background: #FFD600;
    }

    #board-wrapper {
      box-shadow: 0 0 0 2px #000;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      width: 100%;
      max-width: 320px;
      aspect-ratio: 1;
      margin-bottom: 1.5rem;
    }

    .cell {
      border: 2px solid #000;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      aspect-ratio: 1;
    }
    .cell:hover { background: #fafafa; }

    /* Remove doubled borders */
    .cell:nth-child(1), .cell:nth-child(2), .cell:nth-child(3) { border-top: none; }
    .cell:nth-child(1), .cell:nth-child(4), .cell:nth-child(7) { border-left: none; }
    .cell:nth-child(3), .cell:nth-child(6), .cell:nth-child(9) { border-right: none; }
    .cell:nth-child(7), .cell:nth-child(8), .cell:nth-child(9) { border-bottom: none; }

    .mark { width: 52%; height: 52%; pointer-events: none; }

    .game-controls {
      width: 100%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="game-container">
  <div class="header-row">
    <div class="header-side">
      <a class="home-btn" href="../../" aria-label="Home">
        <svg width="23" height="23" viewBox="0 0 24 24" fill="currentColor" fill-rule="evenodd" aria-hidden="true">
          <path d="M4 11L2.5 11L12 3L21.5 11L20 11L20 21Q20 22 19 22L5 22Q4 22 4 21ZM10 15L14 15Q15 15 15 16L15 22L9 22L9 16Q9 15 10 15Z"/>
        </svg>
      </a>
    </div>
    <h1 class="title">Tic-Tac-Toe</h1>
    <div class="header-side"></div>
  </div>

  <!-- LOBBY SCREEN -->
  <div id="screen-lobby">

    <!-- Icon -->
    <svg viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg" style="width:120px;height:auto;margin-bottom:1.25rem;">
      <line x1="32" y1="4"  x2="32" y2="92" stroke="#000" stroke-width="3" stroke-linecap="round"/>
      <line x1="64" y1="4"  x2="64" y2="92" stroke="#000" stroke-width="3" stroke-linecap="round"/>
      <line x1="4"  y1="32" x2="92" y2="32" stroke="#000" stroke-width="3" stroke-linecap="round"/>
      <line x1="4"  y1="64" x2="92" y2="64" stroke="#000" stroke-width="3" stroke-linecap="round"/>
      <line x1="10" y1="10" x2="26" y2="26" stroke="#000" stroke-width="3.5" stroke-linecap="round"/>
      <line x1="26" y1="10" x2="10" y2="26" stroke="#000" stroke-width="3.5" stroke-linecap="round"/>
      <circle cx="48" cy="18" r="9" fill="none" stroke="#000" stroke-width="3.5"/>
      <line x1="40" y1="40" x2="56" y2="56" stroke="#000" stroke-width="3.5" stroke-linecap="round"/>
      <line x1="56" y1="40" x2="40" y2="56" stroke="#000" stroke-width="3.5" stroke-linecap="round"/>
      <circle cx="80" cy="80" r="9" fill="none" stroke="#000" stroke-width="3.5"/>
      <circle cx="16" cy="48" r="9" fill="none" stroke="#000" stroke-width="3.5"/>
      <line x1="10" y1="70" x2="26" y2="86" stroke="#000" stroke-width="3.5" stroke-linecap="round"/>
      <line x1="26" y1="70" x2="10" y2="86" stroke="#000" stroke-width="3.5" stroke-linecap="round"/>
    </svg>

    <!-- Instructions -->
    <p class="instructions">
      Take turns placing X and O on a 3×3 grid.
      First to get three in a row — across, down, or diagonal — wins.
    </p>

    <button class="btn" id="btn-local">Play on This Device</button>
    <div class="lobby-divider">or</div>
    <button class="btn" id="btn-challenge">Challenge a Friend</button>
    <div id="link-panel">
      <div class="link-box">
        <div id="share-url"></div>
        <button class="btn" id="copy-btn">Copy</button>
      </div>
      <div class="status-line" id="lobby-status"></div>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="screen-game" class="hidden">
    <div class="player-badge" id="player-badge"></div>
    <div class="turn-indicator">
      <div class="turn-label" id="turn-label"></div>
      <div class="turn-symbol" id="turn-symbol"></div>
    </div>
    <div id="board-wrapper"></div>
    <div class="game-controls">
      <div class="status-line" id="game-status"></div>
      <button class="btn btn-primary hidden" id="btn-again">Play Again</button>
      <button class="btn" id="btn-menu">Back to Menu</button>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
"use strict";

// ============================================================
// SECTION 1 — CONFIG / CONSTANTS
// ============================================================
const CONFIG = {
  gameIdLength: 4,
  gameIdChars: 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789',
};

// ============================================================
// SECTION 2 — FIREBASE CONFIG
// Replace these values with your own project's config.
// Found in: Firebase Console > Project Settings > Your Apps
// ============================================================
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyDrnan5rxxGwcCpS3tnB68OSTG6toQOL6A",
  authDomain:        "multiplayer-tic-tac-toe-1611a.firebaseapp.com",
  databaseURL:       "https://multiplayer-tic-tac-toe-1611a-default-rtdb.firebaseio.com",
  projectId:         "multiplayer-tic-tac-toe-1611a",
  storageBucket:     "multiplayer-tic-tac-toe-1611a.firebasestorage.app",
  messagingSenderId: "896542207536",
  appId:             "1:896542207536:web:6dd25e3b8950dc65ec47f5",
};

// ============================================================
// SECTION 3 — SYNC ADAPTER
// All Firebase-specific code lives here behind a fixed interface.
// To swap backends, replace only this section.
//
// Interface:
//   syncAdapter.push(gameId, state)       — write full game state
//   syncAdapter.onStateChange(gameId, cb) — subscribe to changes
//   syncAdapter.unsubscribe()             — remove active listener
//   syncAdapter.ready                     — boolean, false if unconfigured
// ============================================================
const syncAdapter = (() => {
  let db = null;
  let activeRef = null;
  let activeHandler = null;

  function init() {
    if (FIREBASE_CONFIG.apiKey === "YOUR_API_KEY") return false;
    try {
      firebase.initializeApp(FIREBASE_CONFIG);
      db = firebase.database();
      return true;
    } catch(e) {
      console.error("Firebase init failed:", e);
      return false;
    }
  }

  function push(gameId, state) {
    if (!db) return;
    db.ref('games/' + gameId).set(state);
  }

  function onStateChange(gameId, cb) {
    if (!db) return;
    unsubscribe();
    activeRef = db.ref('games/' + gameId);
    activeHandler = activeRef.on('value', snap => {
      if (snap.exists()) cb(snap.val());
    });
  }

  function unsubscribe() {
    if (activeRef && activeHandler) {
      activeRef.off('value', activeHandler);
    }
    activeRef = null;
    activeHandler = null;
  }

  const ready = init();
  return { push, onStateChange, unsubscribe, ready };
})();

// ============================================================
// SECTION 4 — PLAYER IDENTITY
// A random player ID is generated once and stored in localStorage.
// When a game is created, this ID is assigned to playerX.
// When a game is joined via link, this ID is assigned to playerO.
// A third visitor to the same link becomes a spectator.
// ============================================================
const identity = (() => {
  const KEY = 'ttt_player_id';
  let id = localStorage.getItem(KEY);
  if (!id) {
    id = Math.random().toString(36).slice(2, 10);
    localStorage.setItem(KEY, id);
  }
  function getRole(state) {
    if (state.playerX === id) return 'X';
    if (state.playerO === id) return 'O';
    return 'spectator';
  }
  return { id, getRole };
})();

// ============================================================
// SECTION 5 — LOBBY / URL LOGIC
// Handles game ID generation, share URL construction, and
// reading the game ID from the URL on page load.
// ============================================================
const lobby = (() => {
  function generateId() {
    let id = '';
    for (let i = 0; i < CONFIG.gameIdLength; i++) {
      id += CONFIG.gameIdChars[Math.floor(Math.random() * CONFIG.gameIdChars.length)];
    }
    return id;
  }

  function getGameIdFromUrl() {
    return new URLSearchParams(window.location.search).get('game');
  }

  function buildShareUrl(gameId) {
    const u = new URL(window.location.href);
    u.search = '';
    u.searchParams.set('game', gameId);
    return u.toString();
  }

  function pushUrlState(gameId) {
    window.history.replaceState({}, '', buildShareUrl(gameId));
  }

  return { generateId, getGameIdFromUrl, buildShareUrl, pushUrlState };
})();

// ============================================================
// SECTION 6 — GAME ENGINE  ← cartridge (swap for other games)
// Pure functions only — no DOM, no network calls.
//
// Exports:
//   engine.initState()                    — returns a fresh game state
//   engine.applyMove(state, index, player) — returns new state or null if illegal
//   engine.getStatus(state)               — { result, winner }
//
// NOTE: Empty cells use '_' instead of null because Firebase
// strips null values from objects, which would destroy the board.
// ============================================================
const engine = (() => {
  const WIN_LINES = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6],
  ];

  function initState() {
    return {
      board:   {"0":"_","1":"_","2":"_","3":"_","4":"_","5":"_","6":"_","7":"_","8":"_"},
      turn:    'X',
      result:  'playing',  // 'playing' | 'win' | 'draw'
      winner:  null,       // null | 'X' | 'O'
      playerX: null,       // player ID strings assigned at game creation
      playerO: null,
    };
  }

  function applyMove(state, index, player) {
    if (state.result !== 'playing') return null;
    if (state.turn !== player)      return null;

    const board = Array.isArray(state.board)
      ? state.board.slice()
      : Object.values(state.board);

    if (board[index] === 'X' || board[index] === 'O') return null;

    board[index] = player;

    for (const [a,b,c] of WIN_LINES) {
      if ((board[a] === 'X' || board[a] === 'O') && board[a] === board[b] && board[b] === board[c]) {
        return { ...state, board: {...board}, result: 'win', winner: player };
      }
    }
    if (board.every(sq => sq === 'X' || sq === 'O')) {
      return { ...state, board: {...board}, result: 'draw', winner: null };
    }
    return { ...state, board: {...board}, turn: player === 'X' ? 'O' : 'X' };
  }

  function getStatus(state) {
    return { result: state.result, winner: state.winner };
  }

  return { initState, applyMove, getStatus };
})();

// ============================================================
// SECTION 7 — UI  ← cartridge (swap for other games)
// Renders game state to DOM and wires up input.
// Never calls Firebase directly — fires onMove(index) callback.
// ============================================================
const ui = (() => {
  function svgX() {
    const s = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    s.setAttribute('viewBox', '0 0 100 100');
    s.classList.add('mark');
    for (const [x1,y1,x2,y2] of [[18,18,82,82],[82,18,18,82]]) {
      const l = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      l.setAttribute('x1',x1); l.setAttribute('y1',y1);
      l.setAttribute('x2',x2); l.setAttribute('y2',y2);
      l.setAttribute('stroke','#000');
      l.setAttribute('stroke-width','12');
      l.setAttribute('stroke-linecap','round');
      s.appendChild(l);
    }
    return s;
  }

  function svgO() {
    const s = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    s.setAttribute('viewBox', '0 0 100 100');
    s.classList.add('mark');
    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    c.setAttribute('cx','50'); c.setAttribute('cy','50'); c.setAttribute('r','34');
    c.setAttribute('fill','none');
    c.setAttribute('stroke','#000');
    c.setAttribute('stroke-width','12');
    s.appendChild(c);
    return s;
  }

  function markerFor(player) {
    return player === 'X' ? svgX() : svgO();
  }

  function buildBoard(onMove) {
    const wrapper = document.getElementById('board-wrapper');
    wrapper.innerHTML = '';
    for (let i = 0; i < 9; i++) {
      const cell = document.createElement('div');
      cell.classList.add('cell');
      cell.dataset.index = i;
      cell.addEventListener('click', () => onMove(i));
      wrapper.appendChild(cell);
    }
  }

  function renderBoard(state) {
    if (!state || !state.board) return;

    const board = Array.isArray(state.board)
      ? state.board
      : Object.values(state.board);

    const cells = document.querySelectorAll('.cell');
    cells.forEach((cell, i) => {
      cell.innerHTML = '';
      if (board[i] === 'X' || board[i] === 'O') {
        cell.appendChild(markerFor(board[i]));
      }
    });
  }

  function renderStatus(state, role) {
    const turnLabel  = document.getElementById('turn-label');
    const turnSymbol = document.getElementById('turn-symbol');
    const gameStatus = document.getElementById('game-status');
    const btnAgain   = document.getElementById('btn-again');
    const badge      = document.getElementById('player-badge');

    // Player badge — show assigned symbol for the whole game
    badge.innerHTML = '';
    if (role !== 'spectator') {
      badge.appendChild(document.createTextNode('You are\u00a0'));
      const sym = document.createElement('span');
      sym.classList.add('player-badge-symbol');
      sym.appendChild(markerFor(role));
      badge.appendChild(sym);
    }

    turnSymbol.innerHTML = '';

    if (state.result === 'playing') {
      btnAgain.classList.add('hidden');
      gameStatus.textContent = '';
      if (role === 'spectator') {
        turnLabel.textContent = state.turn + "'s Turn";
        turnSymbol.appendChild(markerFor(state.turn));
      } else if (state.turn === role) {
        turnLabel.textContent = 'Your Turn';
        turnSymbol.appendChild(markerFor(role));
      } else {
        turnLabel.textContent = "Friend's Turn";
        turnSymbol.appendChild(markerFor(state.turn));
      }
    } else {
      turnLabel.textContent = '';
      btnAgain.classList.remove('hidden');
      if (state.result === 'draw') {
        gameStatus.textContent = 'Draw!';
      } else if (role === 'spectator') {
        gameStatus.textContent = state.winner + ' Wins!';
      } else if (state.winner === role) {
        gameStatus.textContent = 'You Win!';
      } else {
        gameStatus.textContent = 'You Lose.';
      }
    }
  }

  return { buildBoard, renderBoard, renderStatus, markerFor };
})();

// ============================================================
// SECTION 8 — SHELL STARTUP
// Wires lobby, identity, sync adapter, game engine, and UI
// together. This section should not need changes when swapping
// the game cartridge (Sections 6 & 7).
// ============================================================
(function startup() {
  const screenLobby = document.getElementById('screen-lobby');
  const screenGame  = document.getElementById('screen-game');

  function showLobby() {
    screenLobby.classList.remove('hidden');
    screenGame.classList.add('hidden');
  }

  function showGame() {
    screenLobby.classList.add('hidden');
    screenGame.classList.remove('hidden');
  }

  let currentState  = null;
  let currentRole   = 'X';
  let currentGameId = null;
  let isLocal       = false;

  // Firebase stores arrays as objects with numeric string keys.
  // This normalizes the board back to an array when needed.
  function normalizeState(state) {
    if (!state || !state.board) return state;
    if (!Array.isArray(state.board)) {
      state.board = Object.values(state.board);
    }
    return state;
  }

  // --- Handle a move (called by UI on cell click) ---
  function handleMove(index) {
    if (!currentState) return;

    if (isLocal) {
      const next = engine.applyMove(currentState, index, currentState.turn);
      if (!next) return;
      currentState = next;
      ui.renderBoard(currentState);
      ui.renderStatus(currentState, 'spectator');
      return;
    }

    // Remote: only move on your turn
    if (currentState.turn !== currentRole) return;
    const next = engine.applyMove(currentState, index, currentRole);
    if (!next) return;
    next.playerX = currentState.playerX;
    next.playerO = currentState.playerO;
    syncAdapter.push(currentGameId, next);
  }

  // --- Start a local (same-device) game ---
  function startLocalGame() {
    isLocal = true;
    syncAdapter.unsubscribe();
    currentGameId = null;
    currentState  = engine.initState();
    currentRole   = 'spectator';
    ui.buildBoard(handleMove);
    ui.renderBoard(currentState);
    ui.renderStatus(currentState, 'spectator');
    showGame();
  }

  // --- Start a remote game (used by both players) ---
  function startRemoteGame(gameId, state) {
    isLocal       = false;
    currentGameId = gameId;
    currentState  = normalizeState(state);
    currentRole   = identity.getRole(currentState);
    ui.buildBoard(handleMove);
    ui.renderBoard(currentState);
    ui.renderStatus(currentState, currentRole);
    showGame();

    syncAdapter.onStateChange(gameId, remoteState => {
      currentState = normalizeState(remoteState);
      currentRole  = identity.getRole(currentState);
      ui.renderBoard(currentState);
      ui.renderStatus(currentState, currentRole);
    });
  }

  // --- Player 1: create a new remote game and share the link ---
  function createRemoteGame() {
    if (!syncAdapter.ready) {
      alert("Firebase isn't configured.\n\nFill in your Firebase config in Section 2, or use 'Play on This Device'.");
      return;
    }
    const gameId = lobby.generateId();
    const state  = engine.initState();
    state.playerX = identity.id;
    lobby.pushUrlState(gameId);

    document.getElementById('share-url').textContent = lobby.buildShareUrl(gameId);
    document.getElementById('link-panel').classList.add('visible');
    document.getElementById('lobby-status').textContent = 'Waiting for your friend…';

    syncAdapter.push(gameId, state);

    // Wait for Player 2 to claim the O slot and for a complete state
    syncAdapter.onStateChange(gameId, remoteState => {
      if (remoteState.playerO && remoteState.board) {
        document.getElementById('lobby-status').textContent = 'Friend joined!';
        syncAdapter.unsubscribe();
        startRemoteGame(gameId, remoteState);
      }
    });
  }

  // --- Player 2: join an existing remote game from a link ---
  function joinRemoteGame(gameId) {
    if (!syncAdapter.ready) {
      alert("Firebase isn't configured.");
      showLobby();
      return;
    }

    showLobby();
    document.getElementById('link-panel').classList.add('visible');
    document.getElementById('share-url').textContent = lobby.buildShareUrl(gameId);
    document.getElementById('lobby-status').textContent = 'Joining game…';

    firebase.database().ref('games/' + gameId).once('value').then(snap => {
      if (!snap.exists()) {
        document.getElementById('lobby-status').textContent = 'Game not found. The link may be expired.';
        return;
      }
      const state = snap.val();

      // If this player created the game, go straight in
      if (state.playerX === identity.id) {
        startRemoteGame(gameId, state);
        return;
      }

      // Claim the O slot if still open
      if (!state.playerO) {
        state.playerO = identity.id;
        syncAdapter.push(gameId, state);
      }

      startRemoteGame(gameId, state);

    }).catch(err => {
      console.error('Join error:', err);
      document.getElementById('lobby-status').textContent = 'Connection error. Please try again.';
    });
  }

  // --- Copy link button ---
  document.getElementById('copy-btn').addEventListener('click', () => {
    const url = document.getElementById('share-url').textContent;
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 1800);
    });
  });

  // --- Play Again ---
  document.getElementById('btn-again').addEventListener('click', () => {
    if (isLocal) {
      startLocalGame();
    } else {
      const fresh = engine.initState();
      fresh.playerX = currentState.playerX;
      fresh.playerO = currentState.playerO;
      syncAdapter.push(currentGameId, fresh);
    }
  });

  // --- Back to Menu ---
  document.getElementById('btn-menu').addEventListener('click', () => {
    syncAdapter.unsubscribe();
    isLocal = false;
    const u = new URL(window.location.href);
    u.searchParams.delete('game');
    window.history.replaceState({}, '', u.toString());
    document.getElementById('link-panel').classList.remove('visible');
    showLobby();
  });

  document.getElementById('btn-local').addEventListener('click', startLocalGame);
  document.getElementById('btn-challenge').addEventListener('click', createRemoteGame);

  // --- Entry point ---
  // On load, check the URL for an existing game ID.
  // If found, join that game. Otherwise show the lobby.
  const gameIdFromUrl = lobby.getGameIdFromUrl();
  if (gameIdFromUrl) {
    joinRemoteGame(gameIdFromUrl);
  } else {
    showLobby();
  }

})();
</script>
</body>
</html>
